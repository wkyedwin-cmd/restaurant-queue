<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Queue Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

h2{
text-align:center;
}

.searchBox{
margin-bottom:15px;
text-align:center;
}

.searchBox input{
width:300px;
max-width:90%;
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#333;
color:white;
}

.oldQueue{
background:#ffdddd;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.confirm{
background:#28a745;
color:white;
}

.complete{
background:#007bff;
color:white;
}

.delete{
background:#dc3545;
color:white;
}

</style>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAhha-pRzGBXHfSO3PdZ0UmLgGtxfLWcPQ",
authDomain: "yunnans-1u.firebaseapp.com",
projectId: "yunnans-1u",
storageBucket: "yunnans-1u.firebasestorage.app",
messagingSenderId: "490439485047",
appId: "1:490439485047:web:42d5ca722ade09c6b88872"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allQueues=[];

function today(){
return new Date().toISOString().split("T")[0];
}

function formatTime(timestamp){

if(!timestamp) return "-";

const d = timestamp.toDate();

const h = d.getHours().toString().padStart(2,"0");
const m = d.getMinutes().toString().padStart(2,"0");

return h + ":" + m;

}

function isOver40Minutes(timestamp){

if(!timestamp) return false;

const now = new Date();
const queueTime = timestamp.toDate();

const diff = (now - queueTime) / 60000;

return diff >= 40;

}

function loadQueues(){

db.collection("queues")
.where("date","==",today())
.orderBy("timestamp")
.onSnapshot(snapshot=>{

allQueues=[];

snapshot.forEach(doc=>{

let d=doc.data();
d.id=doc.id;

allQueues.push(d);

});

renderTable(allQueues);

});

}

function renderTable(data){

const table=document.getElementById("tbody");

table.innerHTML="";

data.forEach(d=>{

let row=document.createElement("tr");

if(isOver40Minutes(d.timestamp) && d.status=="waiting"){
row.classList.add("oldQueue");
}

row.innerHTML=`

<td>${d.queueNumber}</td>
<td>${formatTime(d.timestamp)}</td>
<td>${d.name}</td>
<td>${d.phone}</td>
<td>${d.adults}</td>
<td>${d.babyChair ?? 0}</td>
<td>${d.status}</td>

<td>

<button class="confirm"
onclick="confirmQueue('${d.id}')">
Confirm
</button>

<button class="complete"
onclick="completeQueue('${d.id}')">
Complete
</button>

<button class="delete"
onclick="deleteQueue('${d.id}')">
Delete
</button>

</td>

`;

table.appendChild(row);

});

}

function searchCustomer(){

const keyword=document
.getElementById("search")
.value
.toLowerCase();

const filtered=allQueues.filter(d=>{

return(
(d.name && d.name.toLowerCase().includes(keyword)) ||
(d.phone && d.phone.toLowerCase().includes(keyword)) ||
(d.queueNumber && d.queueNumber.toLowerCase().includes(keyword))
);

});

renderTable(filtered);

}

function confirmQueue(id){

db.collection("queues")
.doc(id)
.update({status:"confirmed"});

}

function completeQueue(id){

db.collection("queues")
.doc(id)
.update({status:"completed"});

}

function deleteQueue(id){

if(confirm("Delete this queue?")){

db.collection("queues")
.doc(id)
.delete();

}

}

window.onload=loadQueues;

</script>

</head>

<body>

<h2>Yunnans Queue Admin</h2>

<div class="searchBox">

<input
id="search"
placeholder="Search Name / Queue / Phone"
onkeyup="searchCustomer()">

</div>

<table>

<thead>

<tr>
<th>Queue</th>
<th>Time</th>
<th>Name</th>
<th>Phone</th>
<th>People</th>
<th>Baby Chair</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

</body>
</html>
