<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yunnans Queue Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:15px;
}

h2{
text-align:center;
}

.searchBox{
text-align:center;
margin-bottom:15px;
}

.searchBox input{
width:95%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.queueCard{

background:white;
padding:12px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);

}

.oldQueue{
background:#ffd6d6;
}

.topRow{
display:flex;
justify-content:space-between;
font-size:18px;
font-weight:bold;
}

.nameRow{
margin-top:5px;
font-size:16px;
}

.phoneRow{
font-size:14px;
color:#666;
}

.buttonRow{

margin-top:8px;
display:flex;
gap:6px;
flex-wrap:wrap;

}

button{

flex:1;
padding:10px;
border:none;
border-radius:8px;
font-size:14px;
cursor:pointer;

}

.call{background:#ff9800;color:white;}
.confirm{background:#28a745;color:white;}
.complete{background:#007bff;color:white;}
.delete{background:#dc3545;color:white;}

</style>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAhha-pRzGBXHfSO3PdZ0UmLgGtxfLWcPQ",
authDomain: "yunnans-1u.firebaseapp.com",
projectId: "yunnans-1u",
storageBucket: "yunnans-1u.firebasestorage.app",
messagingSenderId: "490439485047",
appId: "1:490439485047:web:42d5ca722ade09c6b88872"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allQueues=[];

function today(){
return new Date().toISOString().split("T")[0];
}

function formatTime(timestamp){

if(!timestamp) return "-";

const d = timestamp.toDate();

const h = d.getHours().toString().padStart(2,"0");
const m = d.getMinutes().toString().padStart(2,"0");

return h+":"+m;

}

function isOver40Minutes(timestamp){

if(!timestamp) return false;

const now=new Date();
const queueTime=timestamp.toDate();

const diff=(now-queueTime)/60000;

return diff>=40;

}

function loadQueues(){

db.collection("queues")
.where("date","==",today())
.orderBy("timestamp")
.onSnapshot(snapshot=>{

allQueues=[];

snapshot.forEach(doc=>{

let d=doc.data();
d.id=doc.id;

allQueues.push(d);

});

renderQueues(allQueues);

});

}

function renderQueues(data){

const container=document.getElementById("list");

container.innerHTML="";

data.forEach(d=>{

let card=document.createElement("div");

card.className="queueCard";

if(isOver40Minutes(d.timestamp) && d.status=="waiting"){
card.classList.add("oldQueue");
}

card.innerHTML=`

<div class="topRow">

<div>${d.queueNumber}</div>
<div>${formatTime(d.timestamp)}</div>

</div>

<div class="nameRow">

${d.name} (${d.adults}人 / Baby ${d.babyChair ?? 0})

</div>

<div class="phoneRow">

${d.phone} | Call ${d.callCount ?? 0}

</div>

<div class="buttonRow">

<button class="call"
onclick="callCustomer('${d.id}','${d.phone}')">
📞 Call
</button>

<button class="confirm"
onclick="confirmQueue('${d.id}')">
✓ Confirm
</button>

<button class="complete"
onclick="completeQueue('${d.id}')">
✔ Done
</button>

<button class="delete"
onclick="deleteQueue('${d.id}')">
✕
</button>

</div>

`;

container.appendChild(card);

});

}

function callCustomer(id,phone){

const ref=db.collection("queues").doc(id);

ref.get().then(doc=>{

let data=doc.data();
let count=data.callCount || 0;

ref.update({
callCount:count+1
});

window.location.href="tel:"+phone;

});

}

function searchCustomer(){

const keyword=document
.getElementById("search")
.value
.toLowerCase();

const filtered=allQueues.filter(d=>{

return(
(d.name && d.name.toLowerCase().includes(keyword)) ||
(d.phone && d.phone.includes(keyword)) ||
(d.queueNumber && d.queueNumber.toLowerCase().includes(keyword))
);

});

renderQueues(filtered);

}

function confirmQueue(id){
db.collection("queues").doc(id).update({status:"confirmed"});
}

function completeQueue(id){
db.collection("queues").doc(id).update({status:"completed"});
}

function deleteQueue(id){

if(confirm("Delete queue?")){
db.collection("queues").doc(id).delete();
}

}

window.onload=loadQueues;

</script>

</head>

<body>

<h2>Yunnans Queue Admin</h2>

<div class="searchBox">

<input
id="search"
placeholder="Search Name / Queue / Phone"
onkeyup="searchCustomer()">

</div>

<div id="list"></div>

</body>
</html>
