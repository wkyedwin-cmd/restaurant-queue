<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  margin:0;
  padding:15px;
}

h2 {
  text-align:center;
  font-size:26px;
}

.section-title {
  margin-top:35px;
  font-size:22px;
  font-weight:bold;
}

.card {
  background:white;
  padding:20px;
  margin-top:15px;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.12);
  font-size:18px;
  line-height:1.6;
}

.queue-number {
  font-size:30px;
  font-weight:bold;
}

.customer-name {
  font-size:22px;
  font-weight:bold;
}

.table-number {
  font-size:28px;
  font-weight:bold;
  color:#d9534f;
}

.last-contacted {
  font-size:16px;
  color:gray;
  margin-top:5px;
}

button {
  padding:10px 14px;
  margin:8px 6px 0 0;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor: pointer;
}

.btn-confirm { background:#28a745; color:white; }
.btn-complete { background:#007bff; color:white; }
.btn-cancel { background:#dc3545; color:white; }
.btn-call { background:#25D366; color:white; }  /* 改成拨号按钮样式 */
.btn-call-clicked { background:gray; color:white; }  /* 已联系过的样式 */

input {
  width:100%;
  padding:12px;
  margin-top:15px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
  box-sizing: border-box;
}

hr {
  margin:45px 0;
  border:2px solid black;
}
</style>

<script>
// ✅ 你的 Firebase 配置
const firebaseConfig = {
  apiKey: "AIzaSyBv2ChloEFegdbT51ANanMTbxF1ttWdfBc",
  authDomain: "yunnans-queue.firebaseapp.com",
  projectId: "yunnans-queue",
  storageBucket: "yunnans-queue.firebasestorage.app",
  messagingSenderId: "663065012532",
  appId: "1:663065012532:web:2ac370a5661ea7e4139d61"
};

// 初始化 Firebase
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();
let allData = [];

// ✅ 直接显示后台
window.onload = function(){
  document.getElementById("panel").style.display = "block";
  loadData();
  console.log("后台页面加载完成，无需密码");
};

// ✅ 修改为拨打电话功能
function makePhoneCall(id, phone){
  if(!phone) return;
  
  const now = new Date();
  
  // 更新最后联系时间
  db.collection("queues").doc(id).update({
    lastContacted: firebase.firestore.Timestamp.fromDate(now)
  });
  
  // 直接拨打电话（手机）或显示号码（电脑）
  const cleanPhone = phone.replace(/[^0-9+]/g, ''); // 只保留数字和+
  
  // 检查是否在手机端
  if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
    // 手机端：直接拨号
    window.location.href = "tel:" + cleanPhone;
  } else {
    // 电脑端：显示提示框
    alert("电话号码: " + cleanPhone + "\n请在手机上拨打此号码");
    // 也可以尝试打开默认拨号软件（如果有）
    window.open("tel:" + cleanPhone, "_blank");
  }
}

function updateStatus(id, status){
  let updateData = { status: status };
  
  // 如果完成或取消，记录完成时间
  if(status === "completed" || status === "cancelled"){
    updateData.finishedAt = firebase.firestore.FieldValue.serverTimestamp();
  }
  
  db.collection("queues").doc(id).update(updateData);
}

function assignTable(id){
  const tableNumber = prompt("请输入桌号:");
  if(!tableNumber) return;
  
  db.collection("queues").doc(id).update({
    status: "confirmed",
    tableNumber: tableNumber
  });
}

function formatTime(timestamp){
  if(!timestamp) return "";
  const date = timestamp.toDate();
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(timestamp){
  if(!timestamp) return "";
  const date = timestamp.toDate();
  return date.toLocaleDateString();
}

function renderList(list, container){
  container.innerHTML = "";
  
  if(list.length === 0){
    container.innerHTML = '<div class="card">暂无数据</div>';
    return;
  }
  
  list.forEach(item => {
    // 格式化时间显示
    const createdTime = item.timestamp ? formatTime(item.timestamp) : item.time || "";
    const createdDate = item.timestamp ? formatDate(item.timestamp) : item.date || "";
    
    // 格式化电话号码显示（方便查看）
    const displayPhone = item.phone || "无号码";
    
    container.innerHTML += `
    <div class="card">
      <div class="queue-number">🆔 ${item.queueNumber}</div>
      📅 ${createdDate} | ⏰ ${createdTime}<br>
      
      <div class="customer-name">👤 ${item.name}</div>
      📞 ${displayPhone}<br>
      
      👨 成人: ${item.adults} 👶 宝宝椅: ${item.babyChairs}<br>
      🪑 座位: ${item.seating || "未选择"}<br>
      
      <div class="table-number">🏷 桌号: ${item.tableNumber || "-"}</div>
      
      ${item.lastContacted ? 
        `<div class="last-contacted">📱 最后联系: ${formatTime(item.lastContacted)}</div>` 
        : ""}
      
      📌 状态: ${item.status}<br>
      
      <!-- 拨打电话按钮 -->
      <button 
        class="${item.lastContacted ? 'btn-call-clicked' : 'btn-call'}"
        onclick="makePhoneCall('${item.id}', '${item.phone}')">
        📞 拨打电话
      </button>
      
      ${item.status === "waiting" ?
      `<button class="btn-confirm" onclick="assignTable('${item.id}')">✅ Confirm + Table</button>` : ""}
      
      ${item.status === "confirmed" ?
      `<button class="btn-complete" onclick="updateStatus('${item.id}', 'completed')">✅ Completed</button>` : ""}
      
      <button class="btn-cancel" onclick="updateStatus('${item.id}', 'cancelled')">❌ Cancel</button>
    </div>
    `;
  });
}

function applyFilter(){
  const keyword = document.getElementById("search").value.toLowerCase();
  let active = [];
  let finished = [];
  
  allData.forEach(data => {
    // 搜索匹配：姓名、电话、排号、日期
    const match = 
      (data.name || "").toLowerCase().includes(keyword) ||
      (data.phone || "").includes(keyword) ||
      String(data.queueNumber || "").includes(keyword) ||
      (data.date || "").includes(keyword);
    
    if(match){
      // 等待中和已确认的归为活跃
      if(data.status === "waiting" || data.status === "confirmed"){
        active.push(data);
      } else {
        // 已完成和取消的归为已完成
        finished.push(data);
      }
    }
  });
  
  // 活跃的按时间正序（先来的在上面）
  active.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
  
  // 已完成的按完成时间倒序（最新的在上面）
  finished.sort((a, b) => (b.finishedAt?.seconds || 0) - (a.finishedAt?.seconds || 0));
  
  renderList(active, document.getElementById("activeList"));
  renderList(finished, document.getElementById("finishedList"));
}

function loadData(){
  // 显示加载中
  document.getElementById("activeList").innerHTML = '<div class="card">加载中...</div>';
  document.getElementById("finishedList").innerHTML = '<div class="card">加载中...</div>';
  
  // 读取所有数据，按时间倒序
  db.collection("queues")
    .orderBy("timestamp", "desc")
    .onSnapshot(snapshot => {
      allData = [];
      snapshot.forEach(doc => {
        allData.push({ ...doc.data(), id: doc.id });
      });
      console.log("加载到 " + allData.length + " 条数据");
      applyFilter();
    }, error => {
      console.error("读取失败:", error);
      document.getElementById("activeList").innerHTML = '<div class="card">❌ 读取失败: ' + error.message + '</div>';
    });
}
</script>
</head>
<body>

<!-- 直接显示后台 -->
<div id="panel">
  <h2>📊 后台管理系统</h2>
  
  <input type="text" id="search" placeholder="🔍 搜索名字 / 电话 / 排号 / 日期" oninput="applyFilter()">
  
  <div class="section-title">🟢 等待中 + 已确认 (Waiting + Confirmed)</div>
  <div id="activeList"></div>
  
  <hr>
  
  <div class="section-title">🔴 已完成 + 已取消 (Completed + Cancelled)</div>
  <div id="finishedList"></div>
</div>

</body>
</html>
