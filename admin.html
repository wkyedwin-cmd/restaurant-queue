<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 · 醒目版</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
/* 整体放大基础字体，确保可读性 */
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 20px;
  font-size: 18px;  /* 基础字体从16->18 */
}

h2 {
  text-align: center;
  font-size: 32px;   /* 更大标题 */
  margin: 10px 0 20px;
}

.section-title {
  margin-top: 45px;
  font-size: 28px;    /* 区域标题放大 */
  font-weight: bold;
  border-left: 8px solid #2c3e50;
  padding-left: 15px;
}

.card {
  background: white;
  padding: 25px;       /* 内边距增加 */
  margin-top: 20px;
  border-radius: 16px;
  box-shadow: 0 5px 12px rgba(0,0,0,0.15);
  font-size: 20px;     /* 卡片内基本字体放大 */
  line-height: 1.7;
}

/* 重点信息：加大加粗 + 背景浅色块 */
.queue-number {
  font-size: 38px;     /* 排号巨大 */
  font-weight: 800;
  background: #e1f0fa;
  display: inline-block;
  padding: 5px 20px;
  border-radius: 60px;
  margin-bottom: 12px;
}

.customer-name {
  font-size: 32px;      /* 名字非常大 */
  font-weight: 900;
  margin: 10px 0 5px;
  color: #1e3c5c;
  border-bottom: 3px solid #ccc;
  padding-bottom: 6px;
}

/* 成人/宝宝椅单独强调 */
.pax-info {
  font-size: 26px;      /* 人数区域放大 */
  font-weight: 600;
  background: #f9f2e0;
  padding: 8px 18px;
  border-radius: 50px;
  display: inline-block;
  margin: 12px 0;
}

.pax-info span {
  font-weight: 900;
  color: #b34b00;
  margin: 0 8px;
}

.table-number {
  font-size: 34px;      /* 桌号醒目 */
  font-weight: bold;
  color: #c9302c;
  background: #ffeeee;
  padding: 5px 20px;
  border-radius: 40px;
  display: inline-block;
}

.last-contacted {
  font-size: 20px;      /* 联系时间稍大 */
  color: #555;
  background: #efefef;
  padding: 6px 12px;
  border-radius: 30px;
  margin: 12px 0;
}

/* 状态标签放大 */
.status-badge {
  font-size: 22px;
  font-weight: bold;
  display: inline-block;
  padding: 8px 25px;
  border-radius: 40px;
  background: #d4edda;
  color: #155724;
  margin: 10px 0;
}

button {
  padding: 14px 22px;    /* 按钮更大 */
  margin: 12px 12px 0 0;
  border: none;
  border-radius: 50px;
  font-size: 20px;       /* 按钮字体加大 */
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 3px 6px rgba(0,0,0,0.1);
}

.btn-confirm { background: #28a745; color: white; }
.btn-complete { background: #007bff; color: white; }
.btn-cancel { background: #dc3545; color: white; }
.btn-whatsapp { background: #25D366; color: white; }
.btn-whatsapp-clicked { background: #a1a1a1; color: white; }

input, select {
  width: 100%;
  padding: 18px;        /* 输入框更大 */
  margin-top: 20px;
  border-radius: 12px;
  border: 1px solid #bbb;
  font-size: 20px;
}

hr {
  margin: 60px 0;
  border: 3px solid #444;
  border-radius: 6px;
}

/* 登录界面同样放大 */
#login input {
  width: 70%;
  margin-right: 10px;
}
#login button {
  width: auto;
  padding: 14px 32px;
}
</style>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAhha-pRzGBXHfSO3PdZ0UmLgGtxfLWcPQ",
  authDomain: "yunnans-1u.firebaseapp.com",
  projectId: "yunnans-1u",
  storageBucket: "yunnans-1u.firebasestorage.app",
  messagingSenderId: "490439485047",
  appId: "1:490439485047:web:42d5ca722ade09c6b88872"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();
let allData = [];

function today(){
  return new Date().toISOString().split("T")[0];
}

function checkPassword(){
  if(document.getElementById("password").value==="1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
    loadData();
  }else{
    alert("密码错误");
  }
}

function openWhatsApp(id, phone){
  if(!phone) return;

  const now = new Date();

  db.collection("queues").doc(id).update({
    lastContacted: firebase.firestore.Timestamp.fromDate(now)
  });

  window.open("https://wa.me/"+phone.replace("+",""),"_blank");
}

function updateStatus(id,status){
  let updateData = { status:status };
  if(status==="completed"||status==="cancelled"){
    updateData.finishedAt = firebase.firestore.FieldValue.serverTimestamp();
  }
  db.collection("queues").doc(id).update(updateData);
}

function assignTable(id){
  const tableNumber = prompt("请输入桌号:");
  if(!tableNumber) return;
  db.collection("queues").doc(id).update({
    status:"confirmed",
    tableNumber:tableNumber
  });
}

function formatTime(timestamp){
  if(!timestamp) return "";
  const date = timestamp.toDate();
  return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

// 修改后的渲染：突出显示名字，人数，宝宝椅，排号
function renderList(list, container){
  container.innerHTML="";
  list.forEach(item=>{
    // 构建显示内容，把姓名、成人/宝宝椅用超大号展示
    container.innerHTML+=`
    <div class="card">
      <div class="queue-number">🆔 ${item.queueNumber}</div>
      <div style="font-size:22px; color:#2c3e50;">📅 ${item.date} | ⏰ ${item.time}</div>

      <div class="customer-name">👤 ${item.name}</div>

      <div class="pax-info">
        👨 成人 <span>${item.adults}</span>  &nbsp;&nbsp; 👶 宝宝椅 <span>${item.babyChairs}</span>
      </div>

      <div class="table-number">🏷 桌号: ${item.tableNumber||"-"}</div>

      ${item.lastContacted ? 
        `<div class="last-contacted">📞 最后联系: ${formatTime(item.lastContacted)}</div>` 
        : ""}

      <div class="status-badge">📌 ${item.status}</div><br>

      <button 
        class="${item.lastContacted ? 'btn-whatsapp-clicked' : 'btn-whatsapp'}"
        onclick="openWhatsApp('${item.id}','${item.phone}')">
        WhatsApp
      </button>

      ${item.status==="waiting" ?
      `<button class="btn-confirm" onclick="assignTable('${item.id}')">✅ Confirm + Table</button>`:""}

      ${item.status==="confirmed" ?
      `<button class="btn-complete" onclick="updateStatus('${item.id}','completed')">✅ Completed</button>`:""}

      <button class="btn-cancel" onclick="updateStatus('${item.id}','cancelled')">❌ Cancel</button>
    </div>
    `;
  });
}

function applyFilter(){
  const keyword=document.getElementById("search").value.toLowerCase();
  let active=[], finished=[];

  allData.forEach(data=>{
    const match=
      (data.name||"").toLowerCase().includes(keyword)||
      (data.phone||"").includes(keyword)||
      String(data.queueNumber||"").includes(keyword);

    if(match){
      if(data.status==="waiting"||data.status==="confirmed"){
        active.push(data);
      }else{
        finished.push(data);
      }
    }
  });

  active.sort((a,b)=>(a.timestamp?.seconds||0)-(b.timestamp?.seconds||0));
  finished.sort((a,b)=>(b.finishedAt?.seconds||0)-(a.finishedAt?.seconds||0));

  renderList(active,document.getElementById("activeList"));
  renderList(finished,document.getElementById("finishedList"));
}

function loadData(){
  db.collection("queues")
  .where("date","==",today())
  .onSnapshot(snapshot=>{
    allData=[];
    snapshot.forEach(doc=>{
      allData.push({...doc.data(),id:doc.id});
    });
    applyFilter();
  });
}
</script>
</head>

<body>

<div id="login">
  <h2>🔐 Admin Login</h2>
  <input type="password" id="password" placeholder="输入密码 1234">
  <button onclick="checkPassword()">Login</button>
</div>

<div id="panel" style="display:none;">
  <h2>👑 后台管理系统 · 大字体版</h2>

  <input type="text" id="search" placeholder="🔍 搜索名字 / 电话 / 排号" oninput="applyFilter()">

  <div class="section-title">🟢 等待中 + 已确认 (WAITING / CONFIRMED)</div>
  <div id="activeList"></div>

  <hr>

  <div class="section-title">🔴 已完成 + 已取消 (COMPLETED / CANCELLED)</div>
  <div id="finishedList"></div>
</div>

</body>
</html>
