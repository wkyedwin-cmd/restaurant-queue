<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin System</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:15px;
  background:#f4f6f9;
}

h2{
  margin-top:25px;
}

.stats{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
  gap:10px;
}

.table-box{
  padding:12px;
  text-align:center;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  color:white;
}

.available{background:#28a745;}
.occupied{background:#dc3545;}
.cleaning{background:#ffc107;color:black;}

.card{
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

button{
  padding:6px 10px;
  margin-top:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.confirmBtn{background:#28a745;color:white;}
.doneBtn{background:#007bff;color:white;}
.cancelBtn{background:#dc3545;color:white;}
</style>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAhha-pRzGBXHfSO3PdZ0UmLgGtxfLWcPQ",
  authDomain: "yunnans-1u.firebaseapp.com",
  projectId: "yunnans-1u",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const tables=[
"A1","A2","A3","A4","A5","A6","A7","A8","A9","A10","A11","A12","A13","A14","A15","A16","A17","A18","A19","A20","A21","A22","A23",
"B1","B2","B3","B4","B5","B6","B7","B8",
"VIP 1","VIP 2","VIP 3",
"C1","C2","C3","C4","C5","C6","C7","C8","C9","C10","C11","C12","C13","C14"
];

let tableStatus={};
let allQueues=[];

function today(){
  return new Date().toISOString().split("T")[0];
}

function checkPassword(){
  if(document.getElementById("password").value==="1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
    initTables();
    loadQueues();
  }else alert("Wrong password");
}

function initTables(){
  tables.forEach(t=>{
    db.collection("tables").doc(t).set({status:"available"},{merge:true});
  });

  db.collection("tables").onSnapshot(snapshot=>{
    tableStatus={};
    snapshot.forEach(doc=>{
      tableStatus[doc.id]=doc.data().status;
    });
    renderTables();
  });
}

function renderTables(){
  const container=document.getElementById("tableGrid");
  container.innerHTML="";

  tables.forEach(t=>{
    const status=tableStatus[t]||"available";
    container.innerHTML+=`
      <div class="table-box ${status}" onclick="toggleTable('${t}')">
        ${t}
      </div>
    `;
  });

  updateStats();
}

function toggleTable(table){
  let current=tableStatus[table];

  let next="available";
  if(current==="available") next="cleaning";
  else if(current==="cleaning") next="occupied";

  db.collection("tables").doc(table).update({status:next});
}

function confirmWithTable(id){
  const available=tables.filter(t=>tableStatus[t]==="available");

  if(available.length===0){
    alert("没有可用桌子");
    return;
  }

  const choice=prompt("可用桌子:\n"+available.join(", "));
  if(!choice || !available.includes(choice)) return;

  db.collection("queues").doc(id).update({
    status:"confirmed",
    tableNumber:choice
  });

  db.collection("tables").doc(choice).update({
    status:"occupied"
  });
}

function completeQueue(id,table){
  db.collection("queues").doc(id).update({
    status:"completed",
    completedAt:Date.now()
  });

  if(table){
    db.collection("tables").doc(table).update({
      status:"cleaning"
    });
  }
}

function cancelQueue(id){
  db.collection("queues").doc(id).update({
    status:"cancelled",
    completedAt:Date.now()
  });
}

function loadQueues(){
  db.collection("queues")
  .where("date","==",today())
  .onSnapshot(snapshot=>{
    allQueues=[];
    snapshot.forEach(doc=>{
      allQueues.push({...doc.data(),id:doc.id});
    });
    renderQueues();
    updateStats();
  });
}

function renderQueues(){
  const active=document.getElementById("active");
  const finished=document.getElementById("finished");

  active.innerHTML="";
  finished.innerHTML="";

  const waiting=allQueues.filter(q=>q.status==="waiting"||q.status==="confirmed");

  const done=allQueues.filter(q=>q.status==="completed"||q.status==="cancelled");

  waiting.forEach(q=>{
    active.innerHTML+=`
      <div class="card">
        <b>${q.queueNumber}</b> - ${q.name}
        <br>桌号: ${q.tableNumber||"-"}
        <br>状态: ${q.status}
        <br>
        ${q.status==="waiting"?
          `<button class="confirmBtn" onclick="confirmWithTable('${q.id}')">Confirm + Table</button>`:""}
        ${q.status==="confirmed"?
          `<button class="doneBtn" onclick="completeQueue('${q.id}','${q.tableNumber}')">Completed</button>`:""}
        <button class="cancelBtn" onclick="cancelQueue('${q.id}')">Cancel</button>
      </div>
    `;
  });

  done.forEach(q=>{
    finished.innerHTML+=`
      <div class="card">
        <b>${q.queueNumber}</b>
        <br>桌号: ${q.tableNumber||"-"}
        <br>状态: ${q.status}
      </div>
    `;
  });
}

function updateStats(){
  const using=tables.filter(t=>tableStatus[t]==="occupied").length;
  const completed=allQueues.filter(q=>q.status==="completed").length;

  document.getElementById("stats").innerHTML=
  `当前使用中桌子: ${using} ｜ 今日完成: ${completed}`;
}
</script>
</head>

<body>

<div id="login">
  <h2>Admin Login</h2>
  <input type="password" id="password">
  <button onclick="checkPassword()">Login</button>
</div>

<div id="panel" style="display:none;">

<div class="stats" id="stats"></div>

<h2>🟢 桌子管理</h2>
<div class="grid" id="tableGrid"></div>

<h2>👥 Waiting / Confirmed</h2>
<div id="active"></div>

<h2>✅ Completed / Cancelled</h2>
<div id="finished"></div>

</div>

</body>
</html>
