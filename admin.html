<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:15px;
  background:#f4f4f4;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.big-table{
  font-size:26px;
  font-weight:bold;
  color:#007bff;
}

button{
  padding:8px 12px;
  margin:4px 4px 0 0;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.confirmBtn{background:#28a745;color:white;}
.doneBtn{background:#333;color:white;}
.cancelBtn{background:#dc3545;color:white;}
.callBtn{background:#007bff;color:white;}

</style>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAhha-pRzGBXHfSO3PdZ0UmLgGtxfLWcPQ",
  authDomain: "yunnans-1u.firebaseapp.com",
  projectId: "yunnans-1u",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allData=[];

function today(){
  return new Date().toISOString().split("T")[0];
}

function checkPassword(){
  if(document.getElementById("password").value==="1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
    loadData();
  }else{
    alert("Wrong password");
  }
}

function callPhone(id,phone){

  if(!phone){
    alert("没有电话号码");
    return;
  }

  let clean = phone.replace(/[^0-9]/g, "");

  if(clean.length < 8){
    alert("电话号码格式错误");
    return;
  }

  const now=new Date().toLocaleTimeString();

  db.collection("queues").doc(id).update({
    lastContacted: now
  });

  const url="tel:"+clean;

  window.location.href=url;
}

function updateStatus(id,status){
  db.collection("queues").doc(id).update({
    status:status,
    completedAt: Date.now()
  });
}

function confirmWithTable(id){

  const tables=[
"A1","A2","A3","A4","A5","A6","A7","A8","A9","A10","A11","A12","A13","A14","A15","A16","A17","A18","A19","A20","A21","A22","A23",
"B1","B2","B3","B4","B5","B6","B7","B8",
"VIP 1","VIP 2","VIP 3",
"C1","C2","C3","C4","C5","C6","C7","C8","C9","C10","C11","C12","C13","C14"
  ];

  const available = tables.join(", ");

  const table = prompt("请选择桌号:\n\n"+available);

  if(!table) return;

  if(!tables.includes(table)){
    alert("无效桌号");
    return;
  }

  db.collection("queues").doc(id).update({
    status:"confirmed",
    tableNumber:table
  });
}

function updateAdults(id,current){

  const newVal=prompt("修改人数 (必须 ≥1):",current);
  if(!newVal) return;

  const num=parseInt(newVal);

  if(isNaN(num) || num<1){
    alert("人数必须为数字且 ≥1");
    return;
  }

  db.collection("queues").doc(id).update({
    adults:num
  });
}

function render(list,container,reverse=false){
  container.innerHTML="";
  if(reverse) list=list.reverse();

  list.forEach(item=>{
    container.innerHTML+=`
    <div class="card">

      <b>${item.queueNumber}</b><br>
      👤 ${item.name}<br>
      📞 ${item.phone}<br>

      👨 人数: ${item.adults}
      <button onclick="updateAdults('${item.id}',${item.adults})">
      修改人数
      </button>
      <br>

      🏷 桌号:
      <div class="big-table">${item.tableNumber||"-"}</div>

      📌 状态: ${item.status}

      ${item.lastContacted ? 
      `<br>📞 Last called: ${item.lastContacted}`:""}

      <br><br>

      <button class="callBtn"
      onclick="callPhone('${item.id}','${item.phone}')">
      Call
      </button>

      ${item.status==="waiting"?
      `<button class="confirmBtn"
      onclick="confirmWithTable('${item.id}')">
      Confirm + Table
      </button>`:""}

      ${item.status==="confirmed"?
      `<button class="doneBtn"
      onclick="updateStatus('${item.id}','completed')">
      Completed
      </button>`:""}

      <button class="cancelBtn"
      onclick="updateStatus('${item.id}','cancelled')">
      Cancel
      </button>

    </div>
    `;
  });
}

function loadData(){
  db.collection("queues")
  .where("date","==",today())
  .onSnapshot(snapshot=>{

    allData=[];

    snapshot.forEach(doc=>{
      allData.push({...doc.data(),id:doc.id});
    });

    const active=allData
      .filter(d=>d.status==="waiting"||d.status==="confirmed")
      .sort((a,b)=>(a.timestamp?.seconds||0)-(b.timestamp?.seconds||0));

    const finished=allData
      .filter(d=>d.status==="completed"||d.status==="cancelled")
      .sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));

    render(active,document.getElementById("active"));
    render(finished,document.getElementById("finished"));

  });
}

</script>
</head>

<body>

<div id="login">

<h2>Admin Login</h2>

<input type="password" id="password">

<button onclick="checkPassword()">
Login
</button>

</div>

<div id="panel" style="display:none;">

<h2>Waiting / Confirmed</h2>
<div id="active"></div>

<hr>

<h2>Completed / Cancelled</h2>
<div id="finished"></div>

</div>

</body>
</html>
