<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yunnans 排号</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
font-size:32px;
font-weight:bold;
color:#27ae60;
margin-bottom:5px;
}

h2{
text-align:center;
margin-top:0;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#27ae60;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#219150;
}

.note{
font-size:13px;
color:#888;
margin-top:-10px;
margin-bottom:10px;
}

.success{
text-align:center;
font-size:20px;
color:#27ae60;
}

.queueNumber{
font-size:40px;
font-weight:bold;
margin-top:10px;
}

</style>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAhha-pRzGBXHfSO3PdZ0UmLgGtxfLWcPQ",
authDomain: "yunnans-1u.firebaseapp.com",
projectId: "yunnans-1u",
storageBucket: "yunnans-1u.firebasestorage.app",
messagingSenderId: "490439485047",
appId: "1:490439485047:web:42d5ca722ade09c6b88872"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function today(){
return new Date().toISOString().split("T")[0];
}

function getNextQueueNumber(snapshot){

let max=0;

snapshot.forEach(doc=>{
let num=doc.data().queueNumber;
if(num){
let n=parseInt(num.replace("A",""));
if(n>max) max=n;
}
});

let next=max+1;

return "A"+String(next).padStart(3,"0");
}

function joinQueue(){

const name=document.getElementById("name").value.trim();
const phone=document.getElementById("phone").value.trim();
const adults=parseInt(document.getElementById("adults").value);
const babyChair=document.getElementById("babyChair").value;

if(!name){
alert("请输入姓名");
return;
}

if(!phone){
alert("请输入电话");
return;
}

if(!adults || adults<1){
alert("人数必须 ≥1");
return;
}

if(adults>22){
alert("最多 22 人");
return;
}

db.collection("queues")
.where("date","==",today())
.get()
.then(snapshot=>{

const queueNumber=getNextQueueNumber(snapshot);

db.collection("queues").add({

name:name,
phone:"+60"+phone,
adults:adults,
babyChair:babyChair,
queueNumber:queueNumber,
status:"waiting",
tableNumber:"",
date:today(),
timestamp:firebase.firestore.FieldValue.serverTimestamp()

}).then(()=>{

document.getElementById("form").style.display="none";

document.getElementById("success").innerHTML=`

<div class="success">
排号成功
<div class="queueNumber">${queueNumber}</div>
请等待叫号
</div>

`;

});

});

}

</script>

</head>

<body>

<div class="container">

<div class="logo">Yunnans@1Utama</div>
<h2>扫码排号</h2>

<div id="form">

<label>姓名</label>
<input id="name" placeholder="Example: Jason">

<label>电话</label>
<input id="phone" placeholder="Example: 123456789">

<div class="note">
系统会自动加 +60
</div>

<label>人数 (最多22)</label>
<input type="number" id="adults" min="1" max="22" placeholder="Example: 4">

<label>需要宝宝椅吗</label>
<select id="babyChair">
<option value="no">不需要</option>
<option value="yes">需要</option>
</select>

<button onclick="joinQueue()">领取排号</button>

</div>

<div id="success"></div>

</div>

</body>
</html>
