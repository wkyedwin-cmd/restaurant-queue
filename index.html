<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yunnans Queue</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.container{
background:white;
padding:25px;
border-radius:12px;
width:100%;
max-width:420px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.logo{
font-size:26px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.notice{
font-size:13px;
color:#555;
margin-top:15px;
}

.result{
text-align:center;
font-size:22px;
margin-top:20px;
}

.waiting{
font-size:18px;
margin-top:10px;
}

</style>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAhha-pRzGBXHfSO3PdZ0UmLgGtxfLWcPQ",
authDomain: "yunnans-1u.firebaseapp.com",
projectId: "yunnans-1u",
storageBucket: "yunnans-1u.firebasestorage.app",
messagingSenderId: "490439485047",
appId: "1:490439485047:web:42d5ca722ade09c6b88872"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let myTimestamp=null;

function today(){
return new Date().toISOString().split("T")[0];
}

function randomQueue(){

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const letter=letters[Math.floor(Math.random()*letters.length)];

const num=Math.floor(Math.random()*999)+1;

return letter+num.toString().padStart(3,"0");

}

function submitQueue(){

const name=document.getElementById("name").value.trim();

const phone =
document.getElementById("countryCode").value +
document.getElementById("phone").value.trim();

const adults=parseInt(document.getElementById("adults").value);

const babyChair=parseInt(document.getElementById("babyChair").value);

if(!name){
alert("请输入名字 / Please enter name");
return;
}

if(!phone){
alert("请输入电话 / Please enter phone");
return;
}

if(isNaN(adults) || adults<1 || adults>22){
alert("人数必须 1-22 人");
return;
}

const queueNumber=randomQueue();

db.collection("queues").add({

name:name,
phone:phone,
adults:adults,
babyChair:babyChair,
queueNumber:queueNumber,
status:"waiting",
date:today(),
timestamp:firebase.firestore.FieldValue.serverTimestamp()

}).then((doc)=>{

document.getElementById("form").style.display="none";

document.getElementById("result").innerHTML=
"你的排号 / Your Queue Number<br><b>"+queueNumber+"</b>";

myTimestamp=new Date();

listenWaiting();

});

}

function listenWaiting(){

db.collection("queues")
.where("date","==",today())
.onSnapshot(snapshot=>{

let count=0;

snapshot.forEach(doc=>{

const d=doc.data();

if(d.status==="waiting" && d.timestamp && myTimestamp){

const t=d.timestamp.toDate();

if(t < myTimestamp) count++;

}

});

document.getElementById("waiting").innerHTML=
"前面还有 "+count+" 组 / "+count+" groups ahead";

});

}

</script>

</head>

<body>

<div class="container">

<div class="logo">Yunnans@1Utama</div>

<div id="form">

<label>名字 Name</label>
<input id="name" placeholder="Example: Jason">

<label>电话 Phone</label>

<div style="display:flex;gap:6px">

<select id="countryCode" style="width:40%">

<option value="+60">🇲🇾 +60</option>
<option value="+65">🇸🇬 +65</option>
<option value="+86">🇨🇳 +86</option>
<option value="+852">🇭🇰 +852</option>
<option value="+886">🇹🇼 +886</option>
<option value="+1">🇺🇸 +1</option>
<option value="+44">🇬🇧 +44</option>
<option value="+61">🇦🇺 +61</option>

</select>

<input id="phone" placeholder="Example: 123456789" style="width:60%">

</div>

<label>人数 Number of People</label>
<input id="adults" type="number" min="1" max="22" placeholder="1 - 22">

<label>宝宝椅 Baby Chair</label>

<select id="babyChair">

<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>

</select>

<button onclick="submitQueue()">排号 Queue</button>

<div class="notice">
因为网络与技术可能延迟前面的排号未必100%准确，特别状况出现我们有权做更改。感谢您的支持与耐心的等待。<br><br>
Due to network delay the queue may not be 100% accurate. Management reserves the right to adjust the queue.
</div>

</div>

<div class="result" id="result"></div>

<div class="waiting" id="waiting"></div>

</div>

</body>
</html>
